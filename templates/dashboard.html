{% extends 'base.html' %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="row g-4 mb-4">
    <div class="col-md">
        <div class="card border-start border-primary border-4 shadow-sm">
            <div class="card-body">
                <div class="d-flex align-items-center">
                    <div class="flex-shrink-0 bg-primary bg-opacity-10 p-3 rounded">
                        <i class="bi bi-receipt text-primary fs-3"></i>
                    </div>
                    <div class="flex-grow-1 ms-3">
                        <div class="text-muted small">Total Orders Today</div>
                        <div class="h3 mb-0" id="metric-total">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md">
        <div class="card border-start border-warning border-4 shadow-sm">
            <div class="card-body">
                <div class="d-flex align-items-center">
                    <div class="flex-shrink-0 bg-warning bg-opacity-10 p-3 rounded">
                        <i class="bi bi-fire text-warning fs-3"></i>
                    </div>
                    <div class="flex-grow-1 ms-3">
                        <div class="text-muted small">In Kitchen</div>
                        <div class="h3 mb-0" id="metric-kitchen">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md">
        <div class="card border-start border-info border-4 shadow-sm">
            <div class="card-body">
                <div class="d-flex align-items-center">
                    <div class="flex-shrink-0 bg-info bg-opacity-10 p-3 rounded">
                        <i class="bi bi-truck text-info fs-3"></i>
                    </div>
                    <div class="flex-grow-1 ms-3">
                        <div class="text-muted small">Ready for Delivery</div>
                        <div class="h3 mb-0" id="metric-ready">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md">
        <div class="card border-start border-success border-4 shadow-sm">
            <div class="card-body">
                <div class="d-flex align-items-center">
                    <div class="flex-shrink-0 bg-success bg-opacity-10 p-3 rounded">
                        <i class="bi bi-check-circle text-success fs-3"></i>
                    </div>
                    <div class="flex-grow-1 ms-3">
                        <div class="text-muted small">Delivered Today</div>
                        <div class="h3 mb-0" id="metric-delivered">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md">
        <div class="card border-start border-danger border-4 shadow-sm">
            <div class="card-body">
                <div class="d-flex align-items-center">
                    <div class="flex-shrink-0 bg-danger bg-opacity-10 p-3 rounded">
                        <i class="bi bi-exclamation-octagon text-danger fs-3"></i>
                    </div>
                    <div class="flex-grow-1 ms-3">
                        <div class="text-muted small">Overdue</div>
                        <div class="h3 mb-0" id="metric-overdue">0</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row g-4">
    <!-- Live Activity Feed -->
    <div class="col-lg-8">
        <div class="card shadow-sm h-100">
            <div class="card-header py-3">
                <h5 class="card-title mb-0"><i class="bi bi-activity me-2"></i>Live Activity Feed</h5>
            </div>
            <div class="list-group" id="activity-feed" style="max-height: 500px; overflow-y: auto;">
                <!-- Activity items here -->
            </div>
        </div>
    </div>

    <!-- Status Distribution Chart -->
    <div class="col-lg-4">
        <div class="card shadow-sm h-100">
            <div class="card-header py-3">
                <h5 class="card-title mb-0"><i class="bi bi-pie-chart me-2"></i>Status Distribution (Today)</h5>
            </div>
            <div class="card-body d-flex align-items-center justify-content-center">
                <canvas id="statusChart" style="max-height: 300px;"></canvas>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let statusChart = null;

    async function loadDashboard() {
        try {
            const res = await fetch('/api/dashboard-data');
            const data = await res.json();
            
            // Metrics
            document.getElementById('metric-total').textContent = data.today_total;
            document.getElementById('metric-kitchen').textContent = data.in_kitchen;
            document.getElementById('metric-ready').textContent = data.ready;
            document.getElementById('metric-delivered').textContent = data.delivered_today;
            document.getElementById('metric-overdue').textContent = data.overdue;
            
            // Activity Feed
            const feed = document.getElementById('activity-feed');
            feed.innerHTML = '';
            data.recent_activity.forEach(a => addActivityItem(a, false));
            
            // Chart
            updateChart(data.status_distribution);
        } catch (e) { console.error('Dashboard load error', e); }
    }

    function addActivityItem(a, animate = true) {
        const feed = document.getElementById('activity-feed');
        const item = `
            <div class="list-group-item py-3 ${animate ? 'fade-in' : ''}">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <span class="fw-bold">Order #${a.order_id}</span> for <span class="text-primary">${a.customer}</span>
                        <div class="text-muted small">${a.change}</div>
                    </div>
                    <small class="text-muted">${a.time}</small>
                </div>
            </div>
        `;
        feed.insertAdjacentHTML('afterbegin', item);
        if (feed.children.length > 10) feed.lastElementChild.remove();
    }

    function updateChart(dist) {
        const labels = ['Received', 'Logged', 'In Preparation', 'Ready', 'Delivered'];
        const dataValues = [
            dist.received || 0,
            dist.logged || 0,
            dist.in_preparation || 0,
            dist.ready || 0,
            dist.delivered || 0
        ];
        
        const isDark = document.documentElement.getAttribute('data-bs-theme') === 'dark';
        const textColor = isDark ? '#f1f5f9' : '#0f172a';
        
        const ctx = document.getElementById('statusChart').getContext('2d');
        if (statusChart) {
            statusChart.data.datasets[0].data = dataValues;
            statusChart.options.plugins.legend.labels.color = textColor;
            statusChart.update();
        } else {
            statusChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataValues,
                        backgroundColor: ['#6c757d', '#0d6efd', '#ffc107', '#0dcaf0', '#198754']
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { 
                        legend: { 
                            position: 'bottom',
                            labels: { color: textColor }
                        } 
                    }
                }
            });
        }
    }

    // Socket listeners for real-time dashboard updates
    socket.on('order_created', (data) => {
        addActivityItem({
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            order_id: data.order_id,
            customer: data.customer_name,
            change: 'was created as received'
        });
        loadDashboard(); // Refresh metrics and chart
    });

    socket.on('order_updated', (data) => {
        addActivityItem({
            time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
            order_id: data.order_id,
            customer: data.customer_name,
            change: `moved to ${data.new_status.replace('_', ' ')}`
        });
        loadDashboard(); // Refresh metrics and chart
    });

    document.addEventListener('DOMContentLoaded', loadDashboard);
</script>

<style>
    .fade-in {
        animation: fadeIn 0.5s ease-in;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
{% endblock %}
