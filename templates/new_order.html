{% extends 'base.html' %}

{% block title %}New Order{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-plus-circle me-2"></i>New Order</h2>
    <a href="{{ url_for('orders') }}" class="btn btn-outline-secondary">Back to List</a>
</div>

<form method="POST" id="orderForm">
    <div class="row">
        <!-- Customer Info -->
        <div class="col-md-5">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title mb-4">Customer Details</h5>
                    <div class="mb-3">
                        <label for="customer_id" class="form-label">Select Customer</label>
                        <div class="input-group">
                            <select name="customer_id" id="customer_id" class="form-select" required>
                                <option value="" selected disabled>Choose a customer...</option>
                                {% for customer in customers %}
                                <option value="{{ customer.id }}">{{ customer.name }} ({{ customer.phone }})</option>
                                {% endfor %}
                            </select>
                            <button type="button" class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#newCustomerModal">
                                <i class="bi bi-person-plus"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="delivery_date" class="form-label">Delivery Date</label>
                        <input type="date" name="delivery_date" id="delivery_date" class="form-control" required min="{{ today }}">
                    </div>
                    <div class="mb-3">
                        <label for="notes" class="form-label">Notes / Instructions</label>
                        <textarea name="notes" id="notes" class="form-control" rows="3" placeholder="Dietary requirements, delivery details, etc."></textarea>
                    </div>
                </div>
            </div>
        </div>

        <!-- Order Items -->
        <div class="col-md-7">
            <div class="card h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="card-title mb-0">Order Items</h5>
                        <button type="button" class="btn btn-sm btn-success" id="addItemBtn">
                            <i class="bi bi-plus-lg me-1"></i>Add Item
                        </button>
                    </div>
                    
                    <div id="itemsContainer">
                        <!-- Items will be added here -->
                        <div class="row g-2 mb-3 item-row">
                            <div class="col-md-7">
                                <select name="product_id[]" class="form-select product-select" required>
                                    <option value="" selected disabled>Select Product</option>
                                    {% for product in products %}
                                    <option value="{{ product.id }}" data-price="{{ product.price_per_unit }}">{{ product.name }} (${{ product.price_per_unit }}/{{ product.unit }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-3">
                                <input type="number" name="quantity[]" class="form-control qty-input" placeholder="Qty" min="0.1" step="0.1" required>
                            </div>
                            <div class="col-md-2 text-end">
                                <button type="button" class="btn btn-outline-danger remove-item-btn" disabled>
                                    <i class="bi bi-trash"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="mt-4 pt-3 border-top d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">Total:</h4>
                        <span class="badge bg-primary fs-4" id="totalBadge">$0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-4 text-end">
        <button type="submit" class="btn btn-primary btn-lg px-5">Submit Order</button>
    </div>
</form>

<!-- New Customer Modal -->
<div class="modal fade" id="newCustomerModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Quick Add Customer</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="newCustomerForm">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="text" name="phone" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea name="address" class="form-control" rows="2"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="saveCustomerBtn">Save Customer</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const itemsContainer = document.getElementById('itemsContainer');
    const addItemBtn = document.getElementById('addItemBtn');
    const totalBadge = document.getElementById('totalBadge');
    const itemRowTemplate = itemsContainer.querySelector('.item-row').cloneNode(true);
    
    // Enable remove button on the template
    itemRowTemplate.querySelector('.remove-item-btn').disabled = false;

    function calculateTotal() {
        let total = 0;
        document.querySelectorAll('.item-row').forEach(row => {
            const select = row.querySelector('.product-select');
            const qtyInput = row.querySelector('.qty-input');
            const selectedOption = select.options[select.selectedIndex];
            
            if (selectedOption && selectedOption.dataset.price && qtyInput.value) {
                total += parseFloat(selectedOption.dataset.price) * parseFloat(qtyInput.value);
            }
        });
        totalBadge.textContent = '$' + total.toFixed(2);
    }

    addItemBtn.addEventListener('click', function() {
        const newRow = itemRowTemplate.cloneNode(true);
        newRow.querySelector('.product-select').value = "";
        newRow.querySelector('.qty-input').value = "";
        itemsContainer.appendChild(newRow);
        attachRowListeners(newRow);
    });

    function attachRowListeners(row) {
        row.querySelector('.product-select').addEventListener('change', calculateTotal);
        row.querySelector('.qty-input').addEventListener('input', calculateTotal);
        row.querySelector('.remove-item-btn').addEventListener('click', function() {
            row.remove();
            calculateTotal();
        });
    }

    // Initialize first row
    attachRowListeners(itemsContainer.querySelector('.item-row'));

    // Customer Quick Add
    const saveCustomerBtn = document.getElementById('saveCustomerBtn');
    saveCustomerBtn.addEventListener('click', function() {
        const form = document.getElementById('newCustomerForm');
        const formData = new FormData(form);
        
        fetch("{{ url_for('new_customer') }}", {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'success') {
                const select = document.getElementById('customer_id');
                const option = new Option(data.name, data.id, true, true);
                select.add(option);
                
                // Close modal
                const modal = bootstrap.Modal.getInstance(document.getElementById('newCustomerModal'));
                modal.hide();
                form.reset();
            } else {
                alert('Error: ' + data.message);
            }
        })
        .catch(err => alert('Error saving customer'));
    });
});
</script>
{% endblock %}
