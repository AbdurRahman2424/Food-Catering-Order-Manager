{% extends 'base.html' %}

{% block title %}{% if product %}Edit Product{% else %}New Product{% endif %}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-pencil-square me-2"></i>{% if product %}Edit Product{% else %}New Product{% endif %}</h2>
            <a href="{{ url_for('products') }}" class="btn btn-outline-secondary">Back to Catalog</a>
        </div>

        <div class="card p-4">
            <form method="POST">
                <div class="mb-3">
                    <label for="name" class="form-label">Product Name</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ product.name if product else '' }}" required>
                </div>
                <div class="mb-3">
                    <label for="description" class="form-label">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="3">{{ product.description if product else '' }}</textarea>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="unit" class="form-label">Unit (e.g., tray, box, kg)</label>
                        <input type="text" class="form-control" id="unit" name="unit" value="{{ product.unit if product else '' }}" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="price_per_unit" class="form-label">Price per Unit ($)</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" step="0.01" class="form-control" id="price_per_unit" name="price_per_unit" value="{{ product.price_per_unit if product else '' }}" required>
                        </div>
                    </div>
                </div>
                {% if product %}
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="is_active" name="is_active" {% if product.is_active %}checked{% endif %}>
                    <label class="form-check-label" for="is_active">Active (available for new orders)</label>
                </div>
                {% endif %}
                
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-primary btn-lg">{% if product %}Update Product{% else %}Add Product{% endif %}</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
